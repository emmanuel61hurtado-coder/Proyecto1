services:

  # ─── Aplicación Flask ──────────────────────────────────────────────────────
  web:
    build: .
    container_name: brujeria_web
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-brujeria_user}:${POSTGRES_PASSWORD:-brujeria_pass_123}@brujeria_db:5432/${POSTGRES_DB:-brujeria}}
      FLASK_ENV: production
    volumes:
      # Uploads de imágenes persistentes
      - uploads_data:/app/app/static/uploads
    networks:
      - brujeria_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

volumes:
  uploads_data:
    driver: local

networks:
  brujeria_network:
    name: brujeria_network
    driver: bridge
