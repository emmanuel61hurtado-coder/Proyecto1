<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — Admin {{ site.site_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">☽ {{ site.site_name }}</div>
      <p class="login-sub">{{ t.admin_login_title }}</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
        {% endif %}
      {% endwith %}

      <form method="POST" class="form-grid">
        <div class="field">
          <label for="username">{{ t.admin_username }}</label>
          <input type="text" id="username" name="username" required autofocus autocomplete="username">
        </div>
        <div class="field">
          <label for="password">{{ t.admin_password }}</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-accent btn-block">{{ t.admin_login_btn }}</button>
      </form>
    </div>
  </div>
</body>
</html>
