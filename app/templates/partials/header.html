<header class="site-header">
  <div class="container nav-inner">
    <a href="{{ url_for('public.index') }}" class="logo">
      <span class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 40 40">
          <circle class="logo-ring" cx="20" cy="20" r="18"/>
          <path class="logo-glow" d="M20 2a18 18 0 0 1 0 36 18 18 0 0 1 0-36Z"/>
          <path class="moon-body" d="M24 8A14 14 0 1 0 24 32 10 10 0 0 1 24 8Z"/>
          <circle class="moon-star" cx="18" cy="15" r="1.5"/>
        </svg>
      </span>
      <span class="logo-text">{{ site.site_name }}<span class="logo-text-dot">.</span></span>
    </a>

    <nav>
      <ul class="nav-links">
        <li><a href="#inicio">{{ t.nav_home }}</a></li>
        <li><a href="#servicios">{{ t.nav_services }}</a></li>
        <li><a href="#sobre-mi">{{ t.nav_about }}</a></li>
        <li><a href="#testimonios">{{ t.nav_testimonials }}</a></li>
        <li><a href="#order">{{ t.nav_order }}</a></li>
      </ul>
    </nav>

    <div class="nav-right">
      <div class="lang-switch">
        <a href="{{ url_for('public.set_language', lang_code='es') }}" class="{{ 'active' if current_lang == 'es' }}">ES</a>
        <a href="{{ url_for('public.set_language', lang_code='en') }}" class="{{ 'active' if current_lang == 'en' }}">EN</a>
      </div>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
