<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site.site_name }}{% endblock %}</title>
  <meta name="description" content="{{ site.tagline_es if current_lang == 'es' else site.tagline_en }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☽</text></svg>">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <div id="preloader" class="preloader">
    <span class="preloader-symbol">☽</span>
    <div class="preloader-ring"></div>
  </div>

  <canvas id="noise-canvas"></canvas>
  <canvas id="particles-canvas"></canvas>

  <div class="ambient-orbs" aria-hidden="true">
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
    <div class="ambient-orb"></div>
  </div>

  <div class="mobile-nav-overlay"></div>

  {% block content %}{% endblock %}

  <a href="https://wa.me/{{ site.whatsapp_number }}?text={{ site.whatsapp_message(current_lang) | urlencode }}"
     class="wa-float" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg viewBox="0 0 32 32" aria-hidden="true"><path d="M16.04 2.67C8.6 2.67 2.56 8.7 2.56 16.13c0 2.5.68 4.83 1.85 6.84L2.67 29.33l6.53-1.71a13.4 13.4 0 0 0 6.84 1.86h.01c7.43 0 13.47-6.04 13.47-13.47S23.47 2.67 16.04 2.67Zm0 24.4h-.01a11.2 11.2 0 0 1-5.7-1.56l-.41-.24-4.23 1.11 1.13-4.13-.27-.42a11.13 11.13 0 0 1-1.71-5.9c0-6.17 5.02-11.18 11.2-11.18 2.99 0 5.8 1.17 7.91 3.28a11.09 11.09 0 0 1 3.28 7.91c0 6.17-5.02 11.13-11.19 11.13Zm6.13-8.34c-.34-.17-1.98-.97-2.28-1.08-.31-.11-.53-.17-.75.17-.22.34-.86 1.08-1.05 1.3-.19.22-.39.25-.72.08-.34-.17-1.42-.52-2.71-1.66a10.2 10.2 0 0 1-1.88-2.33c-.2-.34-.02-.52.15-.69.15-.15.34-.39.5-.59.17-.19.22-.34.34-.56.11-.22.06-.42-.03-.59-.08-.17-.75-1.8-1.02-2.47-.27-.65-.55-.56-.75-.57h-.64c-.22 0-.59.08-.9.42-.31.34-1.18 1.15-1.18 2.81s1.21 3.26 1.38 3.48c.17.22 2.38 3.63 5.76 5.09.8.35 1.43.55 1.92.71.81.26 1.54.22 2.12.13.65-.1 1.98-.81 2.26-1.59.28-.78.28-1.45.2-1.59-.08-.14-.31-.22-.64-.39Z"/></svg>
  </a>

  <!-- Share Modal -->
  <div id="share-modal" class="share-modal" aria-hidden="true">
    <div class="share-modal-overlay"></div>
    <div class="share-modal-content">
      <button class="share-modal-close" aria-label="Cerrar" id="share-close-btn">&times;</button>
      <div class="share-modal-header">
        <h3>Compartir esta página</h3>
        <p>Elige cómo quieres compartir este sitio</p>
      </div>
      
      <!-- QR Code Section -->
      <div class="share-qr-section">
        <div class="qr-container">
          <img id="share-qr-img" src="" alt="Código QR de la página" loading="lazy">
        </div>
        <p class="qr-label">Escanea el código con tu móvil</p>
      </div>

      <!-- Copy Link Section -->
      <div class="share-link-section">
        <div class="copy-input-wrap">
          <input type="text" id="share-link-input" readonly value="">
          <button id="share-copy-btn">
            <span class="copy-text">Copiar</span>
            <svg class="copy-check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </button>
        </div>
      </div>

      <!-- Social Grid Section -->
      <div class="share-social-section">
        <span class="section-title">Enviar directo</span>
        <div class="share-grid">
          <a href="#" id="share-wa" target="_blank" rel="noopener" class="share-item wa" title="Compartir en WhatsApp">
            <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg></div>
            <span>WhatsApp</span>
          </a>
          <a href="#" id="share-fb" target="_blank" rel="noopener" class="share-item fb" title="Compartir en Facebook">
            <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 9h3V5h-3a4 4 0 0 0-4 4v2H7v4h3v7h4v-7h3l1-4h-4V9a1 1 0 0 1 1-1Z"/></svg></div>
            <span>Facebook</span>
          </a>
          <a href="#" id="share-ig" class="share-item ig" title="Compartir en Instagram">
            <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg></div>
            <span>Instagram</span>
          </a>
          <a href="#" id="share-tt" class="share-item tt" title="Compartir en TikTok">
            <div class="share-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg></div>
            <span>TikTok</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="share-toast" class="share-toast" role="alert" aria-live="polite">Enlace copiado al portapapeles</div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
